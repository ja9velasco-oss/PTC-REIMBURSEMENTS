<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PTC Reimbursement Form</title>
<style>
  :root {
    --bg: #0f0f13;
    --bg2: #1a1a22;
    --bg3: #22222e;
    --bg4: #2a2a38;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5;
    --text2: #a0a0b8;
    --text3: #606078;
    --accent: #7c5cfc;
    --accent2: #9b7ffe;
    --accent-bg: rgba(124,92,252,0.15);
    --accent-border: rgba(124,92,252,0.4);
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.12);
    --amber: #fbbf24;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Desktop layout ── */
  @media (min-width: 900px) {
    body {
      background: #08080c;
      justify-content: flex-start;
      padding: 40px 20px;
    }
    .app {
      width: 100%;
      max-width: 720px;
      min-height: auto;
      border-radius: 20px;
      border: 1px solid var(--border2);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .content {
      padding: 28px 36px;
      padding-bottom: 120px;
    }
    .bottom-bar {
      position: sticky !important;
      bottom: 0;
      left: 0 !important;
      transform: none !important;
      width: 100% !important;
      max-width: 100% !important;
      border-top: 1px solid var(--border);
      background: var(--bg2) !important;
      padding: 16px 36px 20px !important;
    }
    .row2 { grid-template-columns: 1fr 1fr; }
    .section-title { font-size: 22px; }
    .day-card { border-radius: 14px; }
    .steps { padding: 20px 36px; }
    .header { padding: 20px 36px 16px; }
  }

  /* ── Mobile layout (default) ── */
  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  /* Header */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--accent2);
  }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .close-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* Step indicator */
  .steps {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 0;
  }
  .step-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
  }
  .step-item:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 14px;
    left: 50%;
    width: 100%;
    height: 1px;
    background: var(--border2);
    z-index: 0;
  }
  .step-item.done:not(:last-child)::after,
  .step-item.active:not(:last-child)::after {
    background: var(--accent);
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text3);
    position: relative; z-index: 1;
    transition: all 0.2s;
  }
  .step-item.active .step-dot {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .step-item.done .step-dot {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .step-label {
    font-size: 10px;
    color: var(--text3);
    margin-top: 5px;
    text-align: center;
  }
  .step-item.active .step-label { color: var(--accent2); }
  .step-item.done .step-label { color: var(--text2); }

  /* Scrollable content */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 100px;
  }

  /* Section headings */
  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
  }

  /* Form elements */
  .field { margin-bottom: 14px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .req { color: var(--red); }
  input[type="text"], input[type="email"], input[type="number"], input[type="date"], select, textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    background: var(--bg3);
  }
  input::placeholder { color: var(--text3); }
  select option { background: var(--bg3); }
  textarea { resize: vertical; min-height: 72px; }

  /* Two col row */
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* Day card */
  .day-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .day-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .day-header-left { display: flex; align-items: center; gap: 10px; }
  .day-badge {
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
  }
  .day-date-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .day-total {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
  }
  .day-body { padding: 14px; }

  /* Type toggle */
  .type-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .type-btn {
    flex: 1;
    padding: 8px 6px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .type-btn.active {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent2);
  }

  /* Leg row */
  .leg-row {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 8px;
  }
  .leg-row-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .leg-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .leg-amount {
    font-size: 13px;
    font-weight: 700;
    color: var(--amber);
  }
  .remove-btn {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--red-bg);
    color: var(--red);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Meal checkbox row */
  .meal-row {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .meal-left { display: flex; align-items: center; gap: 10px; }
  .meal-label { font-size: 13px; color: var(--text); }
  .meal-sub { font-size: 11px; color: var(--text3); }
  .meal-amount { font-size: 13px; font-weight: 700; color: var(--amber); }
  input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Add button */
  .add-btn {
    width: 100%;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 1px dashed var(--border2);
    background: transparent;
    color: var(--accent2);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .add-btn:hover { background: var(--accent-bg); border-color: var(--accent-border); }

  /* Day subtotal bar */
  .day-subtotal {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg3);
    border-top: 1px solid var(--border);
    margin-top: 10px;
    border-radius: 0 0 8px 8px;
  }
  .day-subtotal-label { font-size: 12px; color: var(--text2); font-weight: 600; }
  .day-subtotal-val { font-size: 15px; font-weight: 700; color: var(--green); }

  /* Add day button */
  .add-day-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    border: 1px dashed var(--accent-border);
    background: var(--accent-bg);
    color: var(--accent2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    margin-top: 8px;
  }

  /* Grand total */
  .grand-total {
    background: var(--bg2);
    border: 1px solid var(--accent-border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
  }
  .grand-total-label { font-size: 13px; font-weight: 600; color: var(--text2); }
  .grand-total-val { font-size: 22px; font-weight: 700; color: var(--accent2); }

  /* Upload area */
  .upload-zone {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    background: var(--bg2);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 16px;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
  .upload-gallery-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .upload-hint { font-size: 11px; color: var(--text3); margin-top: 10px; }

  /* Receipt preview grid */
  .receipt-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .receipt-thumb {
    aspect-ratio: 3/4;
    border-radius: var(--radius-sm);
    background: var(--bg3);
    border: 1px solid var(--border2);
    overflow: hidden;
    position: relative;
  }
  .receipt-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .receipt-thumb-remove {
    position: absolute;
    top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px;
    cursor: pointer;
    border: none;
  }
  .receipt-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 4px 6px;
    background: rgba(0,0,0,0.6);
    font-size: 9px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Review section */
  .review-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .review-card-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .review-card-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; }
  .review-card-body { padding: 14px; }
  .review-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .review-row:last-child { border-bottom: none; }
  .review-key { font-size: 13px; color: var(--text2); flex-shrink: 0; }
  .review-val { font-size: 13px; color: var(--text); font-weight: 500; text-align: right; }

  .review-day-block { margin-bottom: 14px; }
  .review-day-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .review-leg {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 13px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .review-leg:last-child { border-bottom: none; }
  .review-leg-val { color: var(--text); font-weight: 500; flex-shrink: 0; }

  /* Info pill */
  .info-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-bg);
    border: 1px solid rgba(74,222,128,0.25);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
    margin-bottom: 16px;
  }

  /* Success screen */
  .success-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    min-height: 60vh;
  }
  .success-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--green-bg);
    border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 24px;
    animation: pop 0.4s ease-out;
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; line-height: 1.5; }
  .req-id-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px 24px;
    margin-bottom: 32px;
    width: 100%;
  }
  .req-id-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .req-id-val { font-size: 22px; font-weight: 700; color: var(--accent2); font-family: 'SF Mono', monospace; }
  .req-email-note { font-size: 12px; color: var(--text3); margin-top: 8px; }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    padding: 12px 20px 24px;
    background: linear-gradient(transparent, var(--bg) 30%);
    /* desktop override handled in @media above */
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .btn-back {
    flex: 0 0 auto;
    padding: 14px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-back:hover { background: var(--bg4); }
  .btn-continue {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-continue:hover { background: var(--accent2); }
  .btn-continue:active { transform: scale(0.98); }
  .btn-new {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Error text */
  .err { font-size: 11px; color: var(--red); margin-top: 4px; display: none; }
  .err.show { display: block; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text3);
    font-size: 13px;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 8px; }

  /* Vehicle km info */
  .calc-info {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-top: 6px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }
  .calc-info strong { color: var(--amber); }

  /* Cutoff badge */
  .cutoff-info {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cutoff-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  input[type="file"] { display: none; }

  /* Route arrow */
  .route-arrow { color: var(--text3); margin: 0 4px; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">P</div>
      <div>
        <div class="header-title">New Reimbursement</div>
        <div class="header-sub" id="step-label-header">Step 1 of 4</div>
      </div>
    </div>
    <div class="close-btn" onclick="confirmClose()">✕</div>
  </div>

  <!-- Steps -->
  <div class="steps" id="steps-bar">
    <div class="step-item active" id="step-1">
      <div class="step-dot">1</div>
      <div class="step-label">Details</div>
    </div>
    <div class="step-item" id="step-2">
      <div class="step-dot">2</div>
      <div class="step-label">Receipt</div>
    </div>
    <div class="step-item" id="step-3">
      <div class="step-dot">3</div>
      <div class="step-label">Review</div>
    </div>
    <div class="step-item" id="step-4">
      <div class="step-dot">4</div>
      <div class="step-label">Submit</div>
    </div>
  </div>

  <!-- Content area -->
  <div class="content" id="content">
    <!-- Rendered by JS -->
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar" id="bottom-bar"></div>

</div>

<input type="file" id="file-input" accept="image/*,.pdf" multiple/>
<input type="file" id="camera-input" accept="image/*" capture="environment" multiple/>

<script>
// ───────────────────────────────────────────────
// CONFIG — replace with your deployed Apps Script URL

// Auto-detect cutoff from today's date
// 1st cutoff: 26th prev month → 10th current month
// 2nd cutoff: 11th → 25th current month
// ───────────────────────────────────────────────
function detectCutoff() {
  const now = new Date();
  const day = now.getDate();
  const month = now.getMonth();
  const year = now.getFullYear();

  let cutoffNum, cutoffMonth, cutoffYear;
  if (day >= 11 && day <= 25) {
    cutoffNum = '2nd'; cutoffMonth = month; cutoffYear = year;
  } else if (day >= 26) {
    cutoffNum = '1st';
    cutoffMonth = (month + 1) % 12;
    cutoffYear = (month === 11) ? year + 1 : year;
  } else {
    cutoffNum = '1st'; cutoffMonth = month; cutoffYear = year;
  }

  const MNAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MSHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const prevMonth = MNAMES[(cutoffMonth - 1 + 12) % 12];

  const dateRange = cutoffNum === '1st'
    ? `26 ${prevMonth} – 10 ${MNAMES[cutoffMonth]} ${cutoffYear}`
    : `11 – 25 ${MNAMES[cutoffMonth]} ${cutoffYear}`;

  return {
    num: cutoffNum,
    month: MNAMES[cutoffMonth],
    monthShort: MSHORT[cutoffMonth],
    monthIndex: cutoffMonth,
    year: cutoffYear,
    label: `${cutoffNum} Cutoff — ${MNAMES[cutoffMonth]} ${cutoffYear}`,
    dateRange,
    folderMonth: `${MNAMES[cutoffMonth]} ${cutoffYear}`,
    folderCutoff: cutoffNum === '1st' ? '1st Cutoff (26th–10th)' : '2nd Cutoff (11th–25th)',
  };
}

// Get initials from full name e.g. "Janine E. Velasco" → "JEV"
function getInitials(name) {
  return name.trim().split(/\s+/).map(w => w[0] ? w[0].toUpperCase() : '').join('');
}
// Generate PDF filename e.g. "REIMBURSEMENT FORM JEV 06182026"
function pdfFilename(type, name, date) {
  const ini = getInitials(name);
  const d = date || new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${type} ${ini} ${mm}${dd}${yyyy}`;
}

function fmt(n) {
  return '₱' + parseFloat(n||0).toLocaleString('en-PH', {minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtNum(n) {
  return parseFloat(n||0).toLocaleString('en-PH', {minimumFractionDigits:2,maximumFractionDigits:2});
}
function genId() {
  const d = new Date();
  return 'REQ-' + d.getFullYear().toString().slice(2) + String(d.getMonth()+1).padStart(2,'0') + '-' + String(Math.floor(Math.random()*9000)+1000);
}
function calcVehicle(type, km, fuel) {
  km = parseFloat(km)||0; fuel = parseFloat(fuel)||0;
  let liters=0, maint=0;
  if(type==='company-2wheel') liters=km/30;
  else if(type==='company-4wheel') liters=km/10;
  else if(type==='private-2wheel'){ liters=km/25; maint=km*1; }
  else if(type==='private-4wheel'){ liters=km/9; maint=km*3; }
  return (liters*fuel)+maint;
}
function dayTotal(day) {
  let t=0;
  if(day.type==='commute') {
    (day.legs||[]).forEach(l=>{ t+=parseFloat(l.amount)||0; });
  } else {
    (day.vehicles||[]).forEach(v=>{ t+=calcVehicle(v.vtype,v.km,v.fuel); });
  }
  if(day.meal_bf) t+=185;
  if(day.meal_ln) t+=185;
  if(day.meal_dn) t+=185;
  (day.others||[]).forEach(o=>{ t+=parseFloat(o.amount)||0; });
  return t;
}
function grandTotal() {
  return formData.days.reduce((s,d)=>s+dayTotal(d),0);
}
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function updateStepBar() {

function buildCalcBreakdown(v) {
  const km=parseFloat(v.km)||0, fuel=parseFloat(v.fuel)||0;
  let lines=[];
  if(v.vtype==='company-2wheel') {
    const L=(km/30);
    lines=[`${km}km ÷ 30 = <strong>${fmtNum(L)}L</strong>`,
           `${fmtNum(L)}L × ₱${fuel} = <strong>${fmt(L*fuel)}</strong>`,
           `Total: <strong>${fmt(L*fuel)}</strong>`];
  } else if(v.vtype==='company-4wheel') {
    const L=(km/10);
    lines=[`${km}km ÷ 10 = <strong>${fmtNum(L)}L</strong>`,
           `${fmtNum(L)}L × ₱${fuel} = <strong>${fmt(L*fuel)}</strong>`,
           `Total: <strong>${fmt(L*fuel)}</strong>`];
  } else if(v.vtype==='private-2wheel') {
    const L=(km/25),maint=km*1;
    lines=[`${km}km ÷ 25 = <strong>${fmtNum(L)}L</strong>`,
           `Fuel: ${fmtNum(L)}L × ₱${fuel} = <strong>${fmt(L*fuel)}</strong>`,
           `Maint: ${km}km × ₱1 = <strong>${fmt(maint)}</strong>`,
           `Total: <strong>${fmt(L*fuel+maint)}</strong>`];
  } else if(v.vtype==='private-4wheel') {
    const L=(km/9),maint=km*3;
    lines=[`${km}km ÷ 9 = <strong>${fmtNum(L)}L</strong>`,
           `Fuel: ${fmtNum(L)}L × ₱${fuel} = <strong>${fmt(L*fuel)}</strong>`,
           `Maint: ${km}km × ₱3 = <strong>${fmt(maint)}</strong>`,
           `Total: <strong>${fmt(L*fuel+maint)}</strong>`];
  }
  return lines.join(' → ');
}

function buildPdfPreviewHtml() {
  const dateStr = new Date().toLocaleDateString('en-PH', {year:'numeric',month:'long',day:'numeric'});
  const fname = pdfFilename('REIMBURSEMENT FORM', formData.requestor, new Date());
  const bname = pdfFilename('REIMBURSEMENT BREAKDOWN', formData.requestor, new Date());

  // Build rows for form
  let rows = '';

    if(day.type==='commute') {
      (day.legs||[]).forEach(leg => {
        if(!leg.transport) return;
        rows += `<tr style="background:#ffffdd"><td style="border:1px solid #000;padding:3px 6px;">${dLabel}</td><td style="border:1px solid #000;padding:3px 6px;">${leg.transport}: ${leg.from||''} – ${leg.to||''}</td><td style="border:1px solid #000;padding:3px 6px;">${day.route||''}</td><td style="border:1px solid #000;padding:3px 6px;text-align:right;">${fmtNum(leg.amount||0)}</td></tr>`;
      });
      if(day.meal_bf) rows += `<tr style="background:#ffffdd"><td style="border:1px solid #000;padding:3px 6px;">${dLabel}</td><td style="border:1px solid #000;padding:3px 6px;">Breakfast</td><td style="border:1px solid #000;padding:3px 6px;">${day.route||''}</td><td style="border:1px solid #000;padding:3px 6px;text-align:right;">185.00</td></tr>`;
      if(day.meal_ln) rows += `<tr style="background:#ffffdd"><td style="border:1px solid #000;padding:3px 6px;">${dLabel}</td><td style="border:1px solid #000;padding:3px 6px;">Lunch</td><td style="border:1px solid #000;padding:3px 6px;">${day.route||''}</td><td style="border:1px solid #000;padding:3px 6px;text-align:right;">185.00</td></tr>`;
    } else {
      (day.vehicles||[]).forEach(v => {
        const km2   = parseFloat(v.km)||0;
        const fuel2 = parseFloat(v.fuel)||0;
        const vt2   = VEHICLE_TYPES.find(x=>x.val===v.vtype);
        const lbl2  = vt2 ? vt2.label : v.vtype;
        let eff=0, liters2=0, maintRate2=0;
        if(v.vtype==='company-2wheel'){ eff=30; liters2=km2/30; }
        else if(v.vtype==='company-4wheel'){ eff=10; liters2=km2/10; }
        else if(v.vtype==='private-2wheel'){ eff=25; liters2=km2/25; maintRate2=1; }
        else if(v.vtype==='private-4wheel'){ eff=9;  liters2=km2/9;  maintRate2=3; }
        const fuelAmt2  = liters2 * fuel2;
        const maintAmt2 = km2 * maintRate2;

        let parts2 = `GAS EXPENSE (${lbl2}) @ ₱${fuel2}/L — ${km2}km ÷ ${eff} = ${liters2.toFixed(2)}L × ₱${fuel2} = ₱${fmtNum(fuelAmt2)}`;

        rows += `<tr style="background:#ffffdd"><td style="border:1px solid #000;padding:3px 6px;">${dLabel}</td><td style="border:1px solid #000;padding:3px 6px;font-size:8.5pt;">${parts2}</td><td style="border:1px solid #000;padding:3px 6px;">${day.route||v.note||''}</td><td style="border:1px solid #000;padding:3px 6px;text-align:right;">${fmtNum(total2)}</td></tr>`;

      if(day.meal_ln) items += '<li style="margin-bottom:3px;">Lunch (flat rate) : <strong>185.00</strong></li>';
      if(day.meal_dn) items += '<li style="margin-bottom:3px;">Dinner (flat rate) : <strong>185.00</strong></li>';

// ───────────────────────────────────────────────
// Actions
// ───────────────────────────────────────────────
// Detect default route based on day of week
// Monday → Home to PTC Silang Office
// Thursday → PTC Silang Office to Home
// Wednesday can also be Home if Thursday is holiday (user adjusts)
function getDefaultRoute(dateStr) {
  const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
  const dow = d.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  if (dow === 1) return { route: 'Home to PTC Silang Office', from: 'Home', to: 'PTC Silang Office' };
  if (dow === 4) return { route: 'PTC Silang Office to Home', from: 'PTC Silang Office', to: 'Home' };
  if (dow === 3) return { route: 'PTC Silang Office to Home', from: 'PTC Silang Office', to: 'Home' }; // Wed if Thu is holiday
  return { route: '', from: 'PTC Office', to: '' };
}

function addDay() {
  const dateStr = todayStr();
  const def = getDefaultRoute(dateStr);
  formData.days.push({
    date: dateStr,
    route: def.route,
    type: 'commute',
    legs: [{ transport:'Drop-off (Company)', from: def.from, to: def.to, amount:0, _touched:true }],
    vehicles: [],
    meal_bf: false,
    meal_ln: false,
    meal_dn: false,
    collapsed: false,
    others: [],   // for Gas, Subscription, etc.
  });
  rerender();
}
function addOther(idx) {
  if(!formData.days[idx].others) formData.days[idx].others=[];
  formData.days[idx].others.push({ desc:'', amount:0, _touched:false });
  rerender();
}
function removeOther(idx, oi) {
  formData.days[idx].others.splice(oi,1);
  rerender();
}
function updateOtherAmount(dayIdx, oi, val) {
  const grandEl = document.querySelector('.grand-total-val');
  const dayTotalEl = document.querySelector(`#day-card-${dayIdx} .day-total`);
  const subtotalEl = document.querySelector(`#day-card-${dayIdx} .day-subtotal-val`);
  const tot = dayTotal(formData.days[dayIdx]);
  if(dayTotalEl) dayTotalEl.textContent = fmt(tot);
  if(subtotalEl) subtotalEl.textContent = fmt(tot);
  if(grandEl) grandEl.textContent = fmt(grandTotal());
}
function updateVehicleAmount(dayIdx, vi) {
  const day = formData.days[dayIdx];
  const v   = (day.vehicles||[])[vi];
  if(!v) return;

  const computed = calcVehicle(v.vtype, v.km, v.fuel);

  // Update the leg amount badge
  const legRows = document.querySelectorAll(`#day-card-${dayIdx} .leg-row`);
  if(legRows[vi]) {
    const badge = legRows[vi].querySelector('.leg-amount');
    if(badge) badge.textContent = computed > 0 ? fmt(computed) : '₱—';

    // Update calc-info text in-place — no full rerender needed
    let calcEl = legRows[vi].querySelector('.calc-info');
    const km   = parseFloat(v.km)||0;
    const fuel = parseFloat(v.fuel)||0;
    if(v.vtype && km && fuel) {
      const calcHtml = buildCalcBreakdown(v) + buildMaintLine(v);
      if(calcEl) {
        calcEl.innerHTML = calcHtml;
      } else {
        // Create it if it doesn't exist yet
        const notesField = legRows[vi].querySelector('input[placeholder="e.g. Site visit to CSB"]');
        if(notesField) {
          const div = document.createElement('div');
          div.className = 'calc-info';
          div.innerHTML = calcHtml;
          notesField.parentElement.parentElement.insertBefore(div, notesField.parentElement);
        }
      }
    } else if(calcEl) {
      calcEl.innerHTML = '';
    }
  }

  // Update day total + subtotal bar + grand total — no scroll
  const dayTotalEl = document.querySelector(`#day-card-${dayIdx} .day-total`);
  const subtotalEl = document.querySelector(`#day-card-${dayIdx} .day-subtotal-val`);
  const grandEl    = document.querySelector('.grand-total-val');
  const tot = dayTotal(day);
  if(dayTotalEl) dayTotalEl.textContent = fmt(tot);
  if(subtotalEl) subtotalEl.textContent = fmt(tot);
  if(grandEl)    grandEl.textContent    = fmt(grandTotal());
}

// Returns maintenance cost line HTML for private vehicles
function buildMaintLine(v) {
  const km = parseFloat(v.km)||0;
  if(!km) return '';
  if(v.vtype==='private-2wheel') return ` → Maint: ${km}km × ₱1 = <strong>${fmt(km*1)}</strong>`;
  if(v.vtype==='private-4wheel') return ` → Maint: ${km}km × ₱3 = <strong>${fmt(km*3)}</strong>`;
  return '';
}

function buildCopyOptions(targetIdx) {
  return formData.days.map((d, i) => {
    if (i === targetIdx) return '';
    const label = `Day ${i+1}${d.date ? ' (' + d.date + ')' : ''}${d.route ? ' — ' + d.route : ''}`;
    return `<option value="${i}">${label}</option>`;
  }).join('');
}

function copyFromDay(targetIdx, sourceIdx) {
  const source = formData.days[sourceIdx];
  if (!source) return;

  // Deep copy the source day into the target, preserving the target's date
  const targetDate = formData.days[targetIdx].date;
  formData.days[targetIdx] = JSON.parse(JSON.stringify(source));
  formData.days[targetIdx].date = targetDate;  // keep original date
  formData.days[targetIdx].collapsed = false;

  rerender();
}

function applyDefaultRoute(idx, dateStr) {
  const def = getDefaultRoute(dateStr);
  if (!def.route) return; // no default for this day, don't overwrite
  formData.days[idx].route = def.route;
  // Update first leg from/to only if it hasn't been manually changed
  const legs = formData.days[idx].legs || [];
  if (legs.length > 0 && (legs[0].from === 'PTC Office' || legs[0].from === 'Home' || legs[0].from === 'PTC Silang Office' || legs[0].from === '')) {
    legs[0].from = def.from;
    legs[0].to   = def.to;
  }
  rerender();
}

function removeDay(i) {
  formData.days.splice(i,1);
  rerender();
}
function toggleDay(i) {
  formData.days[i].collapsed = !formData.days[i].collapsed;
  rerender();
}
function setDayType(idx,type) {
  formData.days[idx].type=type;
  if(type==='vehicle' && !formData.days[idx].vehicles) formData.days[idx].vehicles=[];
  if(type==='commute' && !formData.days[idx].legs) formData.days[idx].legs=[];
  rerender();
}
function addLeg(idx) {
  if(!formData.days[idx].legs) formData.days[idx].legs=[];
  const legs = formData.days[idx].legs;
  const prevTo = legs.length > 0 ? (legs[legs.length-1].to || '') : '';
  legs.push({ transport:'', from: prevTo, to:'', amount:0, _touched:false });
  rerender();
}
function removeLeg(idx,li) {
  formData.days[idx].legs.splice(li,1);
  rerender();
}
function addVehicle(idx) {
  if(!formData.days[idx].vehicles) formData.days[idx].vehicles=[];
  formData.days[idx].vehicles.push({ vtype:'', km:'', fuel:'', note:'' });
  rerender();
}
function removeVehicle(idx,vi) {
  formData.days[idx].vehicles.splice(vi,1);
  rerender();
}
function refreshDayHeader(idx) {
  const label = document.querySelector(`#day-card-${idx} .day-date-label`);
  if(label) label.textContent = formData.days[idx].date || 'No date set';
}

// ── Name autocomplete ────────────────────────────────────────────
function handleNameInput(val) {
  const q = val.trim().toLowerCase();
  const dd = document.getElementById('name-dropdown');
  if(!dd) return;
  if(!q) { dd.style.display='none'; return; }

  const matches = EMPLOYEES.filter(e =>
    e.toLowerCase().includes(q)
  );

  if(matches.length === 0) {
    dd.innerHTML = '<div style="padding:10px 14px;font-size:13px;color:var(--text3);">No match found</div>';
    dd.style.display = 'block';
    return;
  }

  dd.innerHTML = matches.map(e => `
    <div onmousedown="event.preventDefault();selectEmployee('${e.replace(/'/g,"\'")}');hideNameDropdown()"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);"
      onmouseenter="this.style.background='var(--accent-bg)'"
      onmouseleave="this.style.background=''">
      <span style="font-size:13px;font-weight:600;color:var(--text);">${e}</span>
    </div>`).join('');
  dd.style.display = 'block';
}

function selectEmployee(name) {
  formData.requestor  = name;
  formData.department = EMPLOYEE_DEPT;  // always DevOps
  const inp = document.getElementById('f-name');
  if(inp) inp.value = name;
  const errName = document.getElementById('err-name');
  if(errName) errName.className = 'err';
}

function hideNameDropdown() {
  const dd = document.getElementById('name-dropdown');
  if(dd) dd.style.display = 'none';
}

// Update just the leg amount display + day total without full rerender
// to avoid scroll-jump while typing fares
function updateLegAmount(dayIdx, legIdx, val) {
  const amt = parseFloat(val) || 0;
  // Update the leg amount badge in the header
  const legRows = document.querySelectorAll(`#day-card-${dayIdx} .leg-row`);
  if(legRows[legIdx]) {
    const badge = legRows[legIdx].querySelector('.leg-amount');
    if(badge) badge.textContent = amt > 0 ? fmt(amt) : '₱—';
  }
  // Update day total in day header and subtotal bar
  const dayTotalEl = document.querySelector(`#day-card-${dayIdx} .day-total`);
  const subtotalEl = document.querySelector(`#day-card-${dayIdx} .day-subtotal-val`);
  const tot = dayTotal(formData.days[dayIdx]);
  if(dayTotalEl) dayTotalEl.textContent = fmt(tot);
  if(subtotalEl) subtotalEl.textContent = fmt(tot);
  // Also update the grand total card at the bottom of Step 1
  const grandEl = document.querySelector('.grand-total-val');
  if(grandEl) grandEl.textContent = fmt(grandTotal());
}

function rerender() {
  const scrollY = document.getElementById('content').scrollTop;
  render();
  requestAnimationFrame(()=>{ document.getElementById('content').scrollTop = scrollY; });
}

function goStep(n) {
  currentStep = n;
  document.getElementById('content').scrollTop=0;
  render();
}

// Returns {start, end} Date objects for the current cutoff window
function getCutoffWindow() {
  // 1st cutoff: 26th of prev month → 10th of cutoff month
  // 2nd cutoff: 11th → 25th of cutoff month
  const m = CUTOFF.monthIndex;
  const y = CUTOFF.year;
  if (CUTOFF.num === '1st') {
    const prevM = (m - 1 + 12) % 12;
    const prevY = m === 0 ? y - 1 : y;
    return { start: new Date(prevY, prevM, 26), end: new Date(y, m, 10) };
  } else {
    return { start: new Date(y, m, 11), end: new Date(y, m, 25) };
  }
}

function validateStep1() {
  let ok=true;
  const show=(id,show)=>{ const e=document.getElementById(id); if(e) e.className='err'+(show?' show':''); };
  const nameValid = EMPLOYEES.includes(formData.requestor.trim());
  if(!nameValid){ show('err-name',true); ok=false; } else show('err-name',false);
  // Department is always DevOps — no validation needed
  if(!formData.email.match(/^[^@]+@[^@]+\.[^@]+$/)){ show('err-email',true); ok=false; } else show('err-email',false);
  if(!ok) return;
  if(formData.days.length===0){ alert('Please add at least one expense day.'); return; }

  // Validate all dates fall within the current cutoff window
  const win = getCutoffWindow();
  const badDates = [];
  formData.days.forEach((day, i) => {
    if(!day.date) return;
    const d = new Date(day.date + 'T00:00:00');
    if(d < win.start || d > win.end) {
      badDates.push(`Day ${i+1} (${day.date})`);
    }
  });
  if(badDates.length > 0) {
    const winStr = CUTOFF.dateRange;
    alert(`The following day(s) are outside the ${CUTOFF.label} period (${winStr}):\n\n${badDates.join('\n')}\n\nPlease correct the dates or submit under the right cutoff period.`);
    return;
  }

  goStep(2);
}

function handleFiles(files) {
  files.forEach(f => {
    if(f.size > 10*1024*1024) { alert(`${f.name} exceeds 10MB.`); return; }
    const reader = new FileReader();
    reader.onload = e => {
      receipts.push({ name:f.name, dataUrl:e.target.result, size:f.size });
      rerender();
    };
    reader.readAsDataURL(f);
  });
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  handleFiles(Array.from(e.dataTransfer.files));
}
function removeReceipt(i) {
  receipts.splice(i,1);
  rerender();
}

async function submitForm() {
  // Show loading state
  const btn = document.querySelector('.btn-continue');
  if(btn){ btn.textContent = 'Submitting…'; btn.disabled = true; }

  const payload = {
    requestor: formData.requestor,
    department: formData.department,
    email: formData.email,
    cutoff: formData.cutoff,
    days: formData.days,
    receipts: receipts,
  };

  try {
    if(SUBMIT_URL && !SUBMIT_URL.includes('YOUR_NEW_APPS_SCRIPT_URL_HERE')) {
      const res = await fetch(SUBMIT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if(!data.success) throw new Error(data.error || 'Submission failed.');
      generatedReqId = data.reqId;
    } else {
      // Demo mode — no backend connected yet
      await new Promise(r => setTimeout(r, 1200));
      generatedReqId = genId();
    }
    currentStep = 4;
    document.getElementById('content').scrollTop = 0;
    render();
  } catch(err) {
    if(btn){ btn.textContent = 'Submit →'; btn.disabled = false; }
    alert('Submission error: ' + err.message);
  }
}

function resetForm() {
  formData = { requestor:'', department:'', email:'', cutoff: CUTOFF.num, days:[] };
  receipts = [];
  generatedReqId = '';
  currentStep = 1;
  render();
}

function confirmClose() {
  if(formData.requestor || formData.days.length) {
    if(confirm('Discard this reimbursement request?')) resetForm();
  }
}

// Init
render();
</script>
